<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>성적 역산 - 학점수호자</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="shell app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">grade guardian</p>
          <h1>학점수호자</h1>
          <p>과목별 반영비율과 현재 점수를 기준으로 목표 학점까지 필요한 점수를 계산합니다.</p>
        </div>
        <div class="header-score">
          <span>현재 GPA</span>
          <strong id="headerGpa">3.48</strong>
        </div>
      </header>

      <nav class="tabbar" aria-label="주요 화면">
        <a class="tab" href="./index.html">홈</a>
        <a class="tab" href="./study.html">과제/공부</a>
        <a class="tab" href="./calendar.html">캘린더/분석</a>
        <a class="tab active" href="./grade.html">성적 역산</a>
        <a class="tab" href="./generator.html">문제 생성</a>
        <a class="tab" href="./auth.html">로그인</a>
      </nav>

      <section class="page-section">
        <section class="panel result-panel">
          <div class="panel-heading">
            <div>
              <h2>성적 역산 및 목표 학점 분석</h2>
              <p>기본 설정, 반영비율, 현재 확보 점수를 입력하면 목표 달성 가능성과 예상 성적을 계산합니다.</p>
            </div>
          </div>

          <form id="gradeProjectionForm" class="grade-form">
            <div class="grid three equal">
              <label class="field">
                <span>과목명</span>
                <select id="gradeCourseSelect"></select>
              </label>
              <label class="field">
                <span>학점 수</span>
                <input id="gradeCreditUnits" type="number" min="1" max="6" step="0.5" value="3" />
              </label>
              <label class="field">
                <span>현재 성적</span>
                <select id="gradeCurrentGrade">
                  <option value="미정" selected>미정</option>
                  <option value="A+">A+</option>
                  <option value="A0">A0</option>
                  <option value="B+">B+</option>
                  <option value="B0">B0</option>
                  <option value="C+">C+</option>
                  <option value="C0">C0</option>
                  <option value="D+">D+</option>
                  <option value="D0">D0</option>
                </select>
              </label>
            </div>

            <div class="grid three equal">
              <label class="field">
                <span>전체 수강 인원</span>
                <input id="gradeTotalStudents" type="number" min="1" value="100" />
              </label>
              <label class="field">
                <span>목표 학점권 비율</span>
                <input id="gradeTargetPercent" type="number" min="1" max="100" value="30" />
              </label>
              <label class="field">
                <span>목표 성적</span>
                <select id="gradeTargetGrade">
                  <option value="A+">A+</option>
                  <option value="A0" selected>A0</option>
                  <option value="B+">B+</option>
                  <option value="B0">B0</option>
                  <option value="C+">C+</option>
                  <option value="C0">C0</option>
                </select>
              </label>
            </div>

            <div class="grid three equal">
              <label class="field">
                <span>중간 등수</span>
                <input id="gradeMidtermRank" type="number" min="1" placeholder="예: 24" />
              </label>
              <label class="field">
                <span>중간 점수</span>
                <input id="gradeMidtermScore" type="number" min="0" max="100" value="75" />
              </label>
              <label class="field">
                <span>시험일</span>
                <input id="gradeExamDate" type="date" />
              </label>
            </div>

            <div class="grid four">
              <label class="field">
                <span>출석 비율</span>
                <input id="gradeAttendanceWeight" type="number" min="0" max="100" value="10" />
              </label>
              <label class="field">
                <span>과제 비율</span>
                <input id="gradeAssignmentWeight" type="number" min="0" max="100" value="20" />
              </label>
              <label class="field">
                <span>중간 비율</span>
                <input id="gradeMidtermWeight" type="number" min="0" max="100" value="30" />
              </label>
              <label class="field">
                <span>기말 비율</span>
                <input id="gradeFinalWeight" type="number" min="1" max="100" value="40" />
              </label>
            </div>

            <div class="grid four">
              <label class="field">
                <span>출석 점수</span>
                <input id="gradeAttendanceScore" type="number" min="0" max="100" value="100" />
              </label>
              <label class="field">
                <span>과제 점수</span>
                <input id="gradeAssignmentScore" type="number" min="0" max="100" value="85" />
              </label>
              <label class="field">
                <span>중간 평균</span>
                <input id="gradeMidtermMean" type="number" min="0" max="100" placeholder="선택" />
              </label>
              <label class="field">
                <span>중간 표준편차</span>
                <input id="gradeMidtermStd" type="number" min="0" placeholder="선택" />
              </label>
            </div>

            <div class="grid three equal">
              <label class="field">
                <span>기말 예상 평균</span>
                <input id="gradeFinalMean" type="number" min="0" max="100" placeholder="선택" />
              </label>
              <label class="field">
                <span>기말 예상 표준편차</span>
                <input id="gradeFinalStd" type="number" min="0" placeholder="선택" />
              </label>
              <div class="field">
                <span>계산</span>
                <button class="primary" type="submit">목표 점수 분석</button>
              </div>
            </div>
          </form>

          <p id="gradeProjectionStatus" class="status">값을 입력하고 계산하세요.</p>
          <div id="gradeProjectionResult" class="grade-result empty">계산 결과가 여기에 표시됩니다.</div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
