<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - 학점수호자</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="shell app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">grade guardian</p>
          <h1>학점수호자</h1>
        </div>
        <div class="header-score">
          <span>계정</span>
          <strong id="authStateLabel">대기</strong>
        </div>
      </header>

      <nav class="tabbar" aria-label="주요 화면">
        <a class="tab" href="./index.html">홈</a>
        <a class="tab" href="./study.html">과제/공부</a>
        <a class="tab" href="./calendar.html">캘린더/분석</a>
        <a class="tab" href="./grade.html">성적 역산</a>
        <a class="tab" href="./generator.html">문제 생성</a>
        <a class="tab active" href="./auth.html">로그인</a>
      </nav>

      <section class="layout">
        <form id="authForm" class="panel form-panel">
          <div class="panel-heading">
            <div>
              <h2>로그인 / 가입</h2>
            </div>
          </div>

          <label class="field">
            <span>이메일</span>
            <input id="authEmail" type="email" autocomplete="email" required />
          </label>

          <label class="field">
            <span>비밀번호</span>
            <input
              id="authPassword"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>

          <div class="button-row">
            <button
              id="signInButton"
              class="primary inline-primary"
              type="button"
            >
              로그인
            </button>
            <button id="signUpButton" class="secondary" type="button">
              가입
            </button>
            <button id="signOutButton" class="secondary" type="button">
              로그아웃
            </button>
          </div>
        </form>

        <aside class="panel flow-panel">
          <h2>저장 방식</h2>
          <ol class="steps">
            <li>
              <strong>로그인</strong>
            </li>
            <li>
              <strong>학습 상태</strong
              ><span>과목, 교안 요약, 일정은 사용자별 저장</span>
            </li>
            <li>
              <strong>교안 검색</strong>
            </li>
            <li>
              <strong>생성 기록</strong>
            </li>
          </ol>
        </aside>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
